services:
  kong:
    image: kong:3.6
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    ports:
      - "8000:8000"   # Kong proxy — all traffic goes through here
      - "8001:8001"   # Kong admin API
    volumes:
      - ./kong:/kong/declarative
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    environment:
      JWT_SECRET: "demo-secret-change-in-production"
      JWT_ISSUER: "kong-demo"
      PORT: "3001"
    # Not exposed directly — only reachable through Kong
    expose:
      - "3001"

  web:
    build: ./web
    ports:
      - "3000:80"   # React app
    depends_on:
      - kong
